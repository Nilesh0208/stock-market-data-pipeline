name: Stock Pipeline CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install lightweight validation tools
        run: |
          python -m pip install pytest
          python -m pip install python-dotenv
          python -m pip install kafka-python
          python -m pip install psycopg2-binary

      - name: Compile Python source files
        run: |
          python -m compileall producer
          python -m compileall config
          python -m compileall spark
          python -m compileall airflow/dags

      - name: Run tests when available
        run: |
          if [ -d "tests" ]; then
            pytest -v
          else
            echo "No tests directory found yet. Skipping pytest."
          fi


  project-structure-validation:
    name: Project Structure Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify required project files
        run: |
          test -f docker/docker-compose.yml
          test -f docker/Dockerfile.spark
          test -f producer/producer.py
          test -f spark/streaming/kafka_consumer.py
          test -f spark/streaming/silver_transformations.py
          test -f spark/streaming/gold_processor.py
          test -f spark/streaming/data_quality_utils.py
          test -f spark/streaming/alert_processor.py
          test -f airflow/dags/stock_pipeline_health_check.py
          test -f airflow/dags/stock_pipeline_service_health.py
          echo "Required project files are present."


  compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create CI environment file
        run: |
          cat <<EOF > docker/.env
          GRAFANA_ADMIN_USER=ci-admin
          GRAFANA_ADMIN_PASSWORD=ci-password
          AIRFLOW_UID=50000
          AIRFLOW_IMAGE_NAME=apache/airflow:2.10.5
          AIRFLOW_ADMIN_USERNAME=admin
          AIRFLOW_ADMIN_PASSWORD=admin
          AIRFLOW_ADMIN_FIRSTNAME=Pipeline
          AIRFLOW_ADMIN_LASTNAME=Admin
          AIRFLOW_ADMIN_EMAIL=admin@example.com
          EOF

      - name: Validate Docker Compose
        working-directory: docker
        run: docker compose config --quiet